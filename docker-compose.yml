version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rubika-bot-postgres
    environment:
      POSTGRES_USER: rubika_user
      POSTGRES_PASSWORD: rubika_pass
      POSTGRES_DB: rubika_bot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rubika_user -d rubika_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rubika-bot-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
